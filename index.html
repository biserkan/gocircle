<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Draw a Perfect Circle</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; touch-action: none; color: white; user-select: none; }
        #gameCanvas { display: block; width: 100vw; height: 100vh; }
        
        /* Intro Animation SVG Styles */
        .circle-path {
            fill: none;
            stroke-width: 2;
            stroke-linecap: round;
            transform-origin: center;
        }
        .anim-spin-1 { animation: spin 8s linear infinite, dash 4s ease-in-out infinite alternate; stroke: #ff3b30; }
        .anim-spin-2 { animation: spin-reverse 10s linear infinite, dash 5s ease-in-out infinite alternate; stroke: #34c759; }
        .anim-spin-3 { animation: spin 12s linear infinite, dash 6s ease-in-out infinite alternate; stroke: #007aff; }
        .anim-spin-4 { animation: spin-reverse 14s linear infinite, dash 7s ease-in-out infinite alternate; stroke: #af52de; }

        @keyframes spin { 100% { transform: rotate(360deg); } }
        @keyframes spin-reverse { 100% { transform: rotate(-360deg); } }
        @keyframes dash {
            0% { stroke-dasharray: 1, 200; stroke-dashoffset: 0; }
            50% { stroke-dasharray: 89, 200; stroke-dashoffset: -35px; }
            100% { stroke-dasharray: 89, 200; stroke-dashoffset: -124px; }
        }

        /* Share Menu Animation */
        .share-menu { transition: all 0.3s ease; opacity: 0; pointer-events: none; transform: translateY(10px); }
        .share-menu.active { opacity: 1; pointer-events: auto; transform: translateY(0); }

        /* Toast Animation */
        #toast { transition: opacity 0.3s ease; }
    </style>
</head>
<body>

    <!-- Canvas -->
    <canvas id="gameCanvas"></canvas>

    <!-- UI Overlay: Result Text -->
    <div id="resultText" class="absolute inset-0 flex items-center justify-center text-5xl md:text-7xl font-bold opacity-0 transition-opacity duration-300 pointer-events-none">
        <span id="scoreValue" class="text-white drop-shadow-[0_0_10px_rgba(255,255,255,0.8)]"></span>
    </div>

    <!-- UI Overlay: Warning Toast -->
    <div id="toast" class="absolute top-1/4 left-1/2 transform -translate-x-1/2 bg-red-600 text-white px-6 py-3 rounded-full font-bold opacity-0 pointer-events-none z-50 text-xl shadow-lg shadow-red-600/50 transition-opacity duration-300">
        <!-- Toast text will be injected by JS -->
    </div>

    <!-- Top Right: Audio -->
    <div class="absolute top-4 right-4 flex flex-col items-end z-20">
        <!-- Mute Button -->
        <button id="muteBtn" class="p-2 bg-gray-800 rounded-full hover:bg-gray-700 transition mb-3">

        </button>
    </div>

    <!-- Bottom Left: Best Score -->
    <div id="bestScoreDisplay" class="absolute bottom-6 left-6 z-20 text-2xl font-bold text-gray-400 hidden pointer-events-none drop-shadow-md">
        Best: <span id="bestScoreText" class="text-white">0%</span>
    </div>

    <!-- Bottom Right: Main Share Button -->

    <!-- Intro Overlay -->
    <div id="intro" class="absolute inset-0 bg-black z-50 flex flex-col items-center justify-center transition-opacity duration-500">
        <!-- SVG Animation Background -->
        <svg class="absolute inset-0 w-full h-full opacity-50" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
            <circle class="circle-path anim-spin-1" cx="100" cy="100" r="40" />
            <circle class="circle-path anim-spin-2" cx="100" cy="100" r="60" />
            <circle class="circle-path anim-spin-3" cx="100" cy="100" r="80" />
            <circle class="circle-path anim-spin-4" cx="100" cy="100" r="95" />
        </svg>
        
        <!-- Content -->
        <div class="relative z-10 text-center flex flex-col items-center gap-8 px-4">
            <h1 class="text-4xl md:text-6xl font-extrabold tracking-tight text-white drop-shadow-lg">
                Draw a perfect circle
            </h1>
            <p class="text-gray-400 max-w-sm text-lg">Draw the most perfect circle possible around the center (within 5 seconds).</p>
            <button id="startBtn" class="mt-4 px-10 py-4 bg-white text-black text-2xl font-bold rounded-full hover:scale-105 hover:bg-gray-200 transition-all shadow-[0_0_20px_rgba(255,255,255,0.4)]">
                Start
            </button>
        </div>

    <script>
        // --- Core Elements ---
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const intro = document.getElementById('intro');
        const startBtn = document.getElementById('startBtn');
        const resultText = document.getElementById('resultText');
        const scoreValue = document.getElementById('scoreValue');
        const toast = document.getElementById('toast');
        const muteBtn = document.getElementById('muteBtn');
        const iconUnmuted = document.getElementById('icon-unmuted');
        const iconMuted = document.getElementById('icon-muted');
        const mainShareBtn = document.getElementById('mainShareBtn');
        const shareModal = document.getElementById('shareModal');
        const shareModalContent = document.getElementById('shareModalContent');
        const closeShareModal = document.getElementById('closeShareModal');
        const shareImagePreview = document.getElementById('shareImagePreview');
        const bestScoreDisplay = document.getElementById('bestScoreDisplay');
        const bestScoreText = document.getElementById('bestScoreText');

        // --- Game State ---
        let width, height;
        let points = [];
        let isDrawing = false;
        let startTime = 0;
        let drawAnimFrame;
        let isMuted = false;
        let currentBestScore = 0;

        // --- Audio System (Web Audio API) ---
        let audioCtx;
        let pencilNoiseNode;
        let pencilFilter;
        let pencilGain;

        function initAudio() {
            if (audioCtx) return;
            const AudioContext = window.AudioContext || window.webkitAudioContext;
            audioCtx = new AudioContext();

            // Setup Pencil Friction Sound (White Noise through Lowpass Filter)
            const bufferSize = audioCtx.sampleRate * 2; // 2 seconds of noise
            const noiseBuffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
            const output = noiseBuffer.getChannelData(0);
            for (let i = 0; i < bufferSize; i++) {
                output[i] = Math.random() * 2 - 1;
            }

            pencilNoiseNode = audioCtx.createBufferSource();
            pencilNoiseNode.buffer = noiseBuffer;
            pencilNoiseNode.loop = true;

            pencilFilter = audioCtx.createBiquadFilter();
            pencilFilter.type = 'lowpass';
            pencilFilter.frequency.value = 800; // Muffled paper sound

            pencilGain = audioCtx.createGain();
            pencilGain.gain.value = 0; // Starts silent

            pencilNoiseNode.connect(pencilFilter);
            pencilFilter.connect(pencilGain);
            pencilGain.connect(audioCtx.destination);
            pencilNoiseNode.start();
        }

        function playSoundByScore(score) {
            if (isMuted || !audioCtx || score < 50) return;

            const osc = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            osc.connect(gainNode);
            gainNode.connect(audioCtx.destination);

            osc.type = 'sine';
            const now = audioCtx.currentTime;

            if (score >= 50 && score < 70) {
                // Motive edici küçük zil (C5)
                osc.frequency.setValueAtTime(523.25, now);
                gainNode.gain.setValueAtTime(0.5, now);
                gainNode.gain.exponentialRampToValueAtTime(0.01, now + 1);
                osc.start(now);
                osc.stop(now + 1);
            } else if (score >= 70 && score < 90) {
                // Daha motive edici (E5 -> G5)
                osc.frequency.setValueAtTime(659.25, now);
                osc.frequency.exponentialRampToValueAtTime(783.99, now + 0.1);
                gainNode.gain.setValueAtTime(0.5, now);
                gainNode.gain.exponentialRampToValueAtTime(0.01, now + 1.5);
                osc.start(now);
                osc.stop(now + 1.5);
            } else if (score >= 90) {
                // Çok başarılı zil (Arpej hissi C5 -> E5 -> G5 -> C6)
                osc.frequency.setValueAtTime(523.25, now);
                osc.frequency.setValueAtTime(659.25, now + 0.1);
                osc.frequency.setValueAtTime(783.99, now + 0.2);
                osc.frequency.setValueAtTime(1046.50, now + 0.3);
                gainNode.gain.setValueAtTime(0.6, now);
                gainNode.gain.exponentialRampToValueAtTime(0.01, now + 2);
                osc.start(now);
                osc.stop(now + 2);
            }
        }

        // --- Resize & Setup ---
        function resize() {
            width = window.innerWidth;
            height = window.innerHeight;
            canvas.width = width;
            canvas.height = height;
            drawCenterDot();
        }
        window.addEventListener('resize', resize);
        resize();

        function drawCenterDot() {
            ctx.clearRect(0, 0, width, height);
            ctx.beginPath();
            ctx.arc(width/2, height/2, 4, 0, Math.PI * 2);
            ctx.fillStyle = '#00e5ff'; // Vibrant cyan color
            ctx.shadowBlur = 10;
            ctx.shadowColor = '#00e5ff';
            ctx.fill();
            ctx.shadowBlur = 0; // Reset shadow for other drawings
        }

        // --- Utility ---
        function showToast(message) {
            toast.innerText = message;
            toast.style.opacity = '1';
            setTimeout(() => { toast.style.opacity = '0'; }, 2000);
        }

        // --- Events ---
        startBtn.addEventListener('click', () => {
            intro.style.opacity = '0';
            setTimeout(() => { intro.style.display = 'none'; }, 500);
            initAudio(); // Required to start Audio Context on user gesture
        });

        muteBtn.addEventListener('click', () => {
            isMuted = !isMuted;
            iconUnmuted.classList.toggle('hidden', isMuted);
            iconMuted.classList.toggle('hidden', !isMuted);
            if (isMuted && audioCtx) pencilGain.gain.value = 0;
        });

        // Open Share Modal
        mainShareBtn.addEventListener('click', () => {
            generateShareImage();
            shareModal.classList.remove('pointer-events-none');
            shareModal.classList.remove('opacity-0');
            shareModalContent.classList.remove('scale-95');
            shareModalContent.classList.add('scale-100');
        });

        // Close Share Modal
        closeShareModal.addEventListener('click', closeShareWindow);
        shareModal.addEventListener('click', (e) => {
            if (e.target === shareModal) closeShareWindow();
        });

        function closeShareWindow() {
            shareModal.classList.add('opacity-0');
            shareModal.classList.add('pointer-events-none');
            shareModalContent.classList.remove('scale-100');
            shareModalContent.classList.add('scale-95');
        }

        // Drawing Events
        canvas.addEventListener('pointerdown', startDrawing);
        canvas.addEventListener('pointermove', draw);
        canvas.addEventListener('pointerup', stopDrawing);
        canvas.addEventListener('pointercancel', stopDrawing);

        function startDrawing(e) {
            const rect = canvas.getBoundingClientRect();
            const startX = e.clientX - rect.left;
            const startY = e.clientY - rect.top;
            
            // Check if starting point is too close to the center (10% of screen height)
            const cx = width / 2;
            const cy = height / 2;
            const distToCenter = Math.hypot(startX - cx, startY - cy);
            
            if (distToCenter < height * 0.10) {
                showToast("Please draw it bigger !");
                return;
            }

            // Ekrana dokunduğu an eskiyi silip yenisini başlat
            resultText.style.opacity = '0';
            isDrawing = true;
            points = [];
            startTime = Date.now();
            drawCenterDot();
            
            points.push({ x: startX, y: startY });

            if (!isMuted && audioCtx && audioCtx.state === 'running') {
                pencilGain.gain.setTargetAtTime(0.2, audioCtx.currentTime, 0.05);
            }

            loop(); // Start timer check
        }

        function draw(e) {
            if (!isDrawing) return;
            addPoint(e);
            renderPath();
        }

        function stopDrawing(e) {
            if (!isDrawing) return;
            isDrawing = false;
            cancelAnimationFrame(drawAnimFrame);
            
            if (!isMuted && audioCtx) {
                pencilGain.gain.setTargetAtTime(0, audioCtx.currentTime, 0.1);
            }

            evaluateCircle();
        }

        function addPoint(e) {
            const rect = canvas.getBoundingClientRect();
            points.push({
                x: e.clientX - rect.left,
                y: e.clientY - rect.top
            });
        }

        function renderPath() {
            drawCenterDot();
            if (points.length < 2) return;

            ctx.beginPath();
            ctx.moveTo(points[0].x, points[0].y);
            for (let i = 1; i < points.length; i++) {
                ctx.lineTo(points[i].x, points[i].y);
            }
            ctx.strokeStyle = '#ffffff';
            ctx.lineWidth = 4;
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
            ctx.stroke();
        }

        function loop() {
            if (isDrawing) {
                const elapsed = Date.now() - startTime;
                if (elapsed > 5000) {
                    abortDrawing("Drawing is very slow !");
                    return;
                }
                drawAnimFrame = requestAnimationFrame(loop);
            }
        }

        function abortDrawing(message) {
            isDrawing = false;
            cancelAnimationFrame(drawAnimFrame);
            if (!isMuted && audioCtx) pencilGain.gain.setTargetAtTime(0, audioCtx.currentTime, 0.1);
            
            // Show toast message if provided
            if (message) showToast(message);
            
            // Clear screen
            setTimeout(() => { drawCenterDot(); }, 300);
        }

        // --- Core Algorithm ---
        function evaluateCircle() {
            if (points.length < 15) {
                drawCenterDot(); // Too short to be a circle
                return;
            }

            // 1. Calculate Centroid (merkez)
            let cx = 0, cy = 0;
            for (let p of points) { cx += p.x; cy += p.y; }
            cx /= points.length;
            cy /= points.length;

            // 2. Calculate average radius & standard deviation
            let radii = [];
            let avgRadius = 0;
            for (let p of points) {
                let r = Math.hypot(p.x - cx, p.y - cy);
                radii.push(r);
                avgRadius += r;
            }
            avgRadius /= points.length;

            if (avgRadius < 20) {
                drawCenterDot(); // Drawn too small
                return;
            }

            let variance = 0;
            for (let r of radii) {
                variance += Math.pow(r - avgRadius, 2);
            }
            let stdDev = Math.sqrt(variance / points.length);

            // 3. Base Score Calculation
            // Lower standard deviation relative to radius means a better circle.
            let rawScore = 100 - ((stdDev / avgRadius) * 250);

            // 4. Check if loop is closed
            let startP = points[0];
            let endP = points[points.length - 1];
            let gap = Math.hypot(startP.x - endP.x, startP.y - endP.y);
            
            if (gap > avgRadius * 0.5) {
                rawScore -= 50; // Heavy penalty if not closed
            }

            // Normalize
            let finalScore = Math.max(0, Math.min(100, rawScore));
            finalScore = Math.round(finalScore * 10) / 10;

            showResult(finalScore);
        }

        function showResult(score) {
            // Update UI Text
            scoreValue.innerText = score.toFixed(1) + "%";
            
            // Color mapping based on score
            if (score >= 90) scoreValue.className = "drop-shadow-[0_0_15px_rgba(52,199,89,1)] text-[#34c759]";
            else if (score >= 70) scoreValue.className = "drop-shadow-[0_0_10px_rgba(255,255,255,1)] text-white";
            else if (score >= 50) scoreValue.className = "drop-shadow-[0_0_10px_rgba(255,149,0,1)] text-[#ff9500]";
            else scoreValue.className = "drop-shadow-[0_0_10px_rgba(255,59,48,1)] text-[#ff3b30]";

            resultText.style.opacity = '1';

            // Play specific sound
            playSoundByScore(score);

            // Update Best Score
            updateBestScore(score);
        }

        function updateBestScore(newScore) {
            if (newScore > currentBestScore) {
                currentBestScore = newScore;
                bestScoreDisplay.classList.remove('hidden');
                bestScoreText.innerText = currentBestScore.toFixed(1) + "%";
            }
        }

        // --- Generate Share Image (Canvas Drawing) ---
        function generateShareImage() {
            const c = document.createElement('canvas');
            c.width = 800;
            c.height = 450;
            const context = c.getContext('2d');

            // 1. Draw Black Background
            context.fillStyle = '#000000';
            context.fillRect(0, 0, c.width, c.height);

            // 2. Draw Decorative Circles (Like the intro)
            const cx = c.width / 2;
            const cy = c.height / 2;
            const colors = ['#ff3b30', '#34c759', '#007aff', '#af52de'];
            const radii = [70, 100, 130, 150];
            
            context.lineWidth = 3;
            colors.forEach((color, i) => {
                context.beginPath();
                context.arc(cx, cy, radii[i], 0, Math.PI * 2);
                context.strokeStyle = color;
                context.stroke();
            });

            // 3. Dark Overlay to make text readable
            context.fillStyle = 'rgba(0, 0, 0, 0.75)';
            context.fillRect(0, 0, c.width, c.height);

            // 4. Draw Texts
            context.textAlign = 'center';
            context.textBaseline = 'middle';
            
            // Title
            context.font = 'bold 36px sans-serif';
            context.fillStyle = '#ffffff';
            context.fillText('Draw a perfect circle', cx, 80);

            // Subtitle
            context.font = '24px sans-serif';
            context.fillStyle = '#aaaaaa';
            context.fillText('My Best Score', cx, 150);

            // Big Score
            context.font = 'bold 110px sans-serif';
            let scoreStr = (currentBestScore || 0).toFixed(1) + '%';
            if (currentBestScore >= 90) context.fillStyle = '#34c759';
            else if (currentBestScore >= 70) context.fillStyle = '#ffffff';
            else if (currentBestScore >= 50) context.fillStyle = '#ff9500';
            else context.fillStyle = '#ff3b30';
            context.fillText(scoreStr, cx, 230);

            // Website URL
            context.font = '20px monospace';
            context.fillStyle = '#888888';
            let siteUrl = window.location.hostname || 'perfect-circle.game';
            context.fillText(siteUrl, cx, 380);

            // Set the generated image to the preview element in the modal
            shareImagePreview.src = c.toDataURL('image/png');
        }

        function downloadShareImage() {
            const link = document.createElement('a');
            link.download = `perfect-circle-score-${(currentBestScore || 0).toFixed(1)}.png`;
            link.href = shareImagePreview.src;
            link.click();
        }

        // --- Social Share Logic ---
        async function shareScore(platform) {
            const text = `I drew a perfect circle and scored ${(currentBestScore || 0).toFixed(1)}%! How good are you?`;
            const url = window.location.href;
            
            // Modern Mobile Share API (Native sharing with Image)
            // Works beautifully on mobile devices to share directly to Instagram, WhatsApp, etc.
            if (navigator.canShare) {
                try {
                    const response = await fetch(shareImagePreview.src);
                    const blob = await response.blob();
                    const file = new File([blob], 'my-score.png', { type: 'image/png' });
                    
                    if (navigator.canShare({ files: [file] })) {
                         await navigator.share({
                             title: 'Perfect Circle Score',
                             text: text,
                             url: url,
                             files: [file]
                         });
                         closeShareWindow();
                         return; // Successfully used native share
                    }
                } catch (e) {
                    console.log("Native share fallback triggered");
                }
            }

            // Fallback for Desktop web sharing
            let shareUrl = '';
            switch(platform) {
                case 'whatsapp':
                    shareUrl = `https://api.whatsapp.com/send?text=${encodeURIComponent(text + ' ' + url)}`;
                    break;
                case 'twitter':
                    shareUrl = `https://twitter.com/intent/tweet?text=${encodeURIComponent(text)}&url=${encodeURIComponent(url)}`;
                    break;
                case 'facebook':
                    shareUrl = `https://www.facebook.com/sharer/sharer.php?u=${encodeURIComponent(url)}`;
                    break;
                case 'telegram':
                    shareUrl = `https://t.me/share/url?url=${encodeURIComponent(url)}&text=${encodeURIComponent(text)}`;
                    break;
                case 'linkedin':
                    shareUrl = `https://www.linkedin.com/sharing/share-offsite/?url=${encodeURIComponent(url)}`;
                    break;
                case 'reddit':
                    shareUrl = `https://reddit.com/submit?url=${encodeURIComponent(url)}&title=${encodeURIComponent(text)}`;
                    break;
                case 'pinterest':
                    shareUrl = `https://pinterest.com/pin/create/button/?url=${encodeURIComponent(url)}&description=${encodeURIComponent(text)}`;
                    break;
                case 'instagram':
                case 'tiktok':
                    // These platforms don't have web-share intents. Download image and inform user.
                    downloadShareImage();
                    showToast(`Image saved! Open ${platform} to post it.`);
                    return;
            }
            
            if (shareUrl) window.open(shareUrl, '_blank');
        }

    </script>
</body>
